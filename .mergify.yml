pull_request_rules:
  - name: unverified-is-zero
    conditions:
      - base=main
      - title~=UNVTEST
      - "#commits-unverified=0"
    actions:
      comment:
        message: "BUG: Mergify counts 0 unverified commits (unsigned treated as verified)"
  - name: unverified-detected
    conditions:
      - base=main
      - title~=UNVTEST
      - "#commits-unverified>=1"
    actions:
      comment:
        message: "OK: Mergify detected the unsigned commit as unverified"
